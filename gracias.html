<body data-page="biblioteca">

<div id="partial-nav"></div>

<section class="gracias-section">
  <div class="container" style="max-width:580px;text-align:center">
    <div style="display:flex;justify-content:center;margin-bottom:18px">
      <div style="width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:var(--c-golden);border:var(--bw-2) solid var(--c-ink);border-radius:var(--radius-md);box-shadow:var(--shadow-md)">

      </div>
    </div>
    <span class="eyebrow">Compra confirmada</span>
    <h1 style="margin:10px 0 14px;font-size:clamp(1.7rem,3.6vw,2.3rem);line-height:1.05">¡Gracias por confiar en Logramo!</h1>
    <p id="gMsg" style="margin:0 auto 22px;color:var(--c-text-muted);font-size:1.02rem;line-height:1.45;max-width:460px">Preparando tu descarga…</p>
    <div id="gActions" style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap"></div>
    <p style="margin-top:20px;font-size:.82rem;color:var(--c-text-muted)">¿Algo falla? Escríbenos a ayuda@logramo.com y te lo mandamos directo 🐾</p>
  </div>
</section>

<div id="partial-cart"></div>
<div id="partial-chat"></div>
<div id="partial-popups"></div>

<script src="partials.js?v=20260745"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js?v=20260746"></script>
<script>
(function(){
  var sb=window.supabase.createClient('https://eopobchvkfvkkrtrzeyu.supabase.co','sb_publishable_6GZ1L30_DktAPRbsPs-6Lg_PSqJ5c-D');
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  async function downloadPdf(url, filename){
    if(!url) return;
    var nameGuess=(filename||'logramo.pdf').replace(/[^a-z0-9\-_. áéíóúñÁÉÍÓÚÑ]/gi,'').trim()||'logramo.pdf';
    if(!/\.pdf$/i.test(nameGuess)) nameGuess+='.pdf';
    try{
      var res=await fetch(url, { mode:'cors' });
      if(!res.ok) throw new Error('fetch failed');
      var blob=await res.blob();
      var blobUrl=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=blobUrl; a.download=nameGuess; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){URL.revokeObjectURL(blobUrl);},2000);
    }catch(e){
      // Fallback if CORS blocks the fetch: still force download via anchor
      var a=document.createElement('a'); a.href=url; a.download=nameGuess; a.rel='noopener'; document.body.appendChild(a); a.click(); a.remove();
    }
  }

  /* Confetti celebration on successful purchase */
  function celebrate(){
    if(!window.confetti) return;
    var brand=['#F6D055','#C55932','#ADCBEF','#3C4824','#FFCDB8','#FEFAE8'];
    // First big burst from the center
    confetti({ particleCount:140, spread:90, startVelocity:55, origin:{x:.5,y:.45}, colors:brand, scalar:1.1 });
    // Side cannons after a beat
    setTimeout(function(){ confetti({ particleCount:80, angle:60, spread:75, origin:{x:0,y:.7}, colors:brand }); confetti({ particleCount:80, angle:120, spread:75, origin:{x:1,y:.7}, colors:brand }); }, 280);
    // Gentle finale
    setTimeout(function(){ confetti({ particleCount:60, spread:120, startVelocity:35, origin:{x:.5,y:.3}, colors:brand, gravity:.6, scalar:.9 }); }, 700);
  }

  (async function(){
    var params=new URLSearchParams(location.search);
    // ?ids=a,b,c for a cart order; ?id=a for a single product-page purchase.
    var ids=(params.get('ids')||params.get('id')||'').split(',').map(function(s){return s.trim();}).filter(Boolean);
    var msg=document.getElementById('gMsg'), act=document.getElementById('gActions');
    // Fire confetti for everyone who lands here after paying
    celebrate();
    var fallback=function(){ msg.textContent='Tu compra se procesó. Si no recibes tu archivo, contáctanos.'; act.innerHTML='<a href="biblioteca.html" class="btn btn--primary">Ir a la biblioteca</a>'; };
    if(!ids.length){ fallback(); return; }
    var r; try{ r=await sb.from('products').select('id,title,pdf_url').in('id',ids); }catch(e){}
    if(!r || r.error || !r.data || !r.data.length){ fallback(); return; }
    // Keep the order the buyer added them in.
    var prods=ids.map(function(id){ return r.data.find(function(p){return p.id===id;}); }).filter(Boolean);
    var withPdf=prods.filter(function(p){return p.pdf_url;});
    var single=prods.length===1;

    if(single){
      var p=prods[0];
      if(p.pdf_url){
        msg.innerHTML='Tu guía <strong>'+esc(p.title)+'</strong> está lista. La descarga empieza automáticamente.';
        act.innerHTML='<button class="btn btn--primary" id="gDl"><svg class="icon"><use href="#i-pdf"/></svg> Descargar de nuevo</button><a href="biblioteca.html" class="btn btn--cream">Seguir explorando</a>';
        document.getElementById('gDl').addEventListener('click',function(){ downloadPdf(p.pdf_url, p.title); });
        setTimeout(function(){ downloadPdf(p.pdf_url, p.title); }, 800);
      } else {
        msg.innerHTML='Tu guía <strong>'+esc(p.title)+'</strong> está confirmada. Recibirás un email con el archivo en breve. <br><small style="opacity:.7">(El vendedor aún no ha subido el PDF, pero estará disponible muy pronto.)</small>';
        act.innerHTML='<a href="biblioteca.html" class="btn btn--primary">Seguir explorando</a>';
      }
      return;
    }

    // Multi-guide cart order: list every guide with its own download button.
    msg.innerHTML='Tus <strong>'+prods.length+' guías</strong> están listas. Las descargas empiezan automáticamente.';
    var rows=prods.map(function(p,i){
      if(p.pdf_url){
        return '<button class="btn btn--primary gracias-dl" data-pdf="'+esc(p.pdf_url)+'" data-name="'+esc(p.title)+'"><svg class="icon"><use href="#i-pdf"/></svg> '+esc(p.title)+'</button>';
      }
      return '<span class="btn btn--cream gracias-dl" style="opacity:.7;cursor:default">'+esc(p.title)+' · llega por email</span>';
    }).join('');
    act.innerHTML='<div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:420px;margin:0 auto">'+rows+'<a href="biblioteca.html" class="btn btn--cream">Seguir explorando</a></div>';
    Array.prototype.forEach.call(act.querySelectorAll('button[data-pdf]'),function(b){
      b.addEventListener('click',function(){ downloadPdf(b.getAttribute('data-pdf'), b.getAttribute('data-name')); });
    });
    // Stagger the auto-downloads so the browser doesn't block them as a burst.
    withPdf.forEach(function(p,i){ setTimeout(function(){ downloadPdf(p.pdf_url, p.title); }, 800+i*1200); });
  })();
})();
</script>
</body>

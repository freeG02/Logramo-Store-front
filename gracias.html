<body data-page="biblioteca">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="script.js?v=20260743"></script>
<script>
(function(){
  var sb=window.supabase.createClient('https://eopobchvkfvkkrtrzeyu.supabase.co','sb_publishable_6GZ1L30_DktAPRbsPs-6Lg_PSqJ5c-D');
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  async function downloadPdf(url, filename){
    if(!url) return;
    var nameGuess=(filename||'logramo.pdf').replace(/[^a-z0-9\-_. áéíóúñÁÉÍÓÚÑ]/gi,'').trim()||'logramo.pdf';
    if(!/\.pdf$/i.test(nameGuess)) nameGuess+='.pdf';
    try{
      var res=await fetch(url, { mode:'cors' });
      if(!res.ok) throw new Error('fetch failed');
      var blob=await res.blob();
      var blobUrl=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=blobUrl; a.download=nameGuess; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){URL.revokeObjectURL(blobUrl);},2000);
    }catch(e){
      // Fallback if CORS blocks the fetch: still force download via anchor
      var a=document.createElement('a'); a.href=url; a.download=nameGuess; a.rel='noopener'; document.body.appendChild(a); a.click(); a.remove();
    }
  }

  /* Confetti celebration on successful purchase */
  function celebrate(){
    if(!window.confetti) return;
    var brand=['#F6D055','#C55932','#ADCBEF','#3C4824','#FFCDB8','#FEFAE8'];
    // First big burst from the center
    confetti({ particleCount:140, spread:90, startVelocity:55, origin:{x:.5,y:.45}, colors:brand, scalar:1.1 });
    // Side cannons after a beat
    setTimeout(function(){ confetti({ particleCount:80, angle:60, spread:75, origin:{x:0,y:.7}, colors:brand }); confetti({ particleCount:80, angle:120, spread:75, origin:{x:1,y:.7}, colors:brand }); }, 280);
    // Gentle finale
    setTimeout(function(){ confetti({ particleCount:60, spread:120, startVelocity:35, origin:{x:.5,y:.3}, colors:brand, gravity:.6, scalar:.9 }); }, 700);
  }

  (async function(){
    var id=new URLSearchParams(location.search).get('id');
    var msg=document.getElementById('gMsg'), act=document.getElementById('gActions');
    // Fire confetti for everyone who lands here after paying
    celebrate();
    if(!id){ msg.textContent='Tu compra se procesó. Si no recibes tu archivo, contáctanos.'; act.innerHTML='<a href="biblioteca.html" class="btn btn--primary">Ir a la biblioteca</a>'; return; }
    var r; try{ r=await sb.from('products').select('title,pdf_url').eq('id',id).single(); }catch(e){}
    if(!r || r.error || !r.data){ msg.textContent='Tu compra se procesó. Si no recibes tu archivo, contáctanos.'; act.innerHTML='<a href="biblioteca.html" class="btn btn--primary">Ir a la biblioteca</a>'; return; }
    var p=r.data;
    if(p.pdf_url){
      msg.innerHTML='Tu guía <strong>'+esc(p.title)+'</strong> está lista. La descarga empieza automáticamente.';
      act.innerHTML='<button class="btn btn--primary" id="gDl"><svg class="icon"><use href="#i-pdf"/></svg> Descargar de nuevo</button><a href="biblioteca.html" class="btn btn--cream">Seguir explorando</a>';
      document.getElementById('gDl').addEventListener('click',function(){ downloadPdf(p.pdf_url, p.title); });
      setTimeout(function(){ downloadPdf(p.pdf_url, p.title); }, 800);
    } else {
      msg.innerHTML='Tu guía <strong>'+esc(p.title)+'</strong> está confirmada. Recibirás un email con el archivo en breve. <br><small style="opacity:.7">(El vendedor aún no ha subido el PDF, pero estará disponible muy pronto.)</small>';
      act.innerHTML='<a href="biblioteca.html" class="btn btn--primary">Seguir explorando</a>';
    }
  })();
})();
</script>
</body>
</html>

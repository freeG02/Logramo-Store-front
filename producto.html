<!-- Backdrop while the product modal opens on top. Mirrors biblioteca's hero so
     the shared URL feels intentional and offers a way back to the library. -->
<section class="library-hero">
  <div class="container">
    <span class="eyebrow" data-reveal>Biblioteca</span>
    <h1 data-reveal id="prHeroTitle">Abriendo este libro…</h1>
    <p class="lead" data-reveal id="prHeroDesc">Te lo mostramos en un segundo 🐾</p>
    <div data-reveal style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="biblioteca.html" class="btn btn--primary btn--lg">Ver toda la biblioteca <svg class="icon"><use href="#i-arrow-right"/></svg></a>

<script>
/* Auto-open the product modal from ?id=…
   producto.html is now a thin shell that exists only to preserve old shared
   URLs (SEO, WhatsApp, Google) — the actual product experience is the modal.
   The hero behind invites the visitor to browse the library if they close it. */
(function () {
  var id = (new URLSearchParams(location.search)).get('id');
  if (!id) { location.replace('biblioteca.html'); return; }
  function ready(cb) {
    if (typeof window.openFreebieFor === 'function') cb();
    else setTimeout(function () { ready(cb); }, 50);
  }
  ready(async function () {
    var p = null;
    try {
      var SB_URL = 'https://eopobchvkfvkkrtrzeyu.supabase.co';
      var SB_KEY = 'sb_publishable_6GZ1L30_DktAPRbsPs-6Lg_PSqJ5c-D';
      var r = await fetch(SB_URL + '/rest/v1/products?id=eq.' + encodeURIComponent(id) + '&select=*', {
        headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY }
      });
      if (r.ok) { var arr = await r.json(); p = Array.isArray(arr) && arr[0]; }
    } catch (e) {}
    if (!p) { location.replace('biblioteca.html'); return; }
    document.title = (p.title || 'Producto') + ' · Logramo';
    var meta = document.getElementById('prMetaDesc'); if (meta) meta.setAttribute('content', p.description || ('Logramo · ' + p.title));
    var ht = document.getElementById('prHeroTitle'); if (ht) ht.textContent = p.title || 'Producto';
    var hd = document.getElementById('prHeroDesc'); if (hd) hd.textContent = p.description || 'Abre la guía para más detalles 🐾';
    window.openFreebieModal(p);
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Logramo — Tu cuenta. Entra o crea una cuenta en segundos." />
  <title>Mi cuenta — Logramo</title>
  <link rel="stylesheet" href="styles.css?v=20260612" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
  <style>
    /* ============ AUTH PAGE ============ */
    .auth {
      padding: 80px 0 120px;
      background: var(--c-cream);
      min-height: calc(100vh - 80px);
    }
    .auth__inner {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .auth__head { text-align: center; margin-bottom: 32px; }
    .auth__head .eyebrow { margin-bottom: 12px; }
    .auth__title {
      font-family: var(--font-body);
      font-weight: 900;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: -.03em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .auth__title em { font-style: normal; color: var(--c-terracotta); }
    .auth__sub { color: var(--c-text-muted); max-width: 420px; margin: 0 auto; }

    .auth-card {
      background: var(--c-golden);
      border: var(--bw-2) solid var(--c-ink);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: var(--c-ink);
      border: var(--bw-1) solid var(--c-ink);
      border-radius: var(--radius-full);
      padding: 5px;
      margin-bottom: 28px;
    }
    .auth-tab {
      padding: 12px 18px;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--c-cream);
      background: transparent;
      transition: background .2s var(--ease), color .2s var(--ease);
    }
    .auth-tab.active { background: var(--c-cream); color: var(--c-ink); }

    .auth-form { display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; }

    .auth-field { display: flex; flex-direction: column; gap: 6px; }
    .auth-field label {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--c-ink);
    }
    .auth-input {
      padding: 16px 22px;
      border-radius: var(--radius-full);
      border: var(--bw-1) solid var(--c-ink);
      background: var(--c-cream);
      font-size: 1rem;
      color: var(--c-ink);
      outline: none;
      box-shadow: var(--shadow-xs);
      transition: transform .15s var(--ease-back), box-shadow .15s var(--ease-back);
    }
    .auth-input:focus { transform: translate(-2px,-2px); box-shadow: var(--shadow-sm); }
    .auth-input::placeholder { color: #999; }

    .auth-note {
      font-size: .8rem;
      color: var(--c-ink);
      opacity: .75;
      text-align: center;
      margin-top: 10px;
    }
    .auth-note a { font-weight: 700; text-decoration: underline; }

    .auth-error {
      background: var(--c-terracotta);
      color: var(--c-cream);
      border: var(--bw-1) solid var(--c-ink);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      font-size: .85rem;
      font-weight: 600;
      box-shadow: var(--shadow-xs);
      display: none;
    }
    .auth-error.show { display: block; }

    .auth-form .btn { margin-top: 6px; justify-content: center; }

    /* ============ PROFILE (logged in) ============ */
    .profile-card {
      background: var(--c-cream);
      border: var(--bw-2) solid var(--c-ink);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .profile-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--c-golden);
      border: var(--bw-2) solid var(--c-ink);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-family: var(--font-body);
      font-weight: 900;
      font-size: 2.4rem;
      color: var(--c-ink);
      box-shadow: var(--shadow-sm);
      text-transform: uppercase;
    }
    .profile-name {
      font-family: var(--font-body);
      font-weight: 900;
      font-size: 1.8rem;
      line-height: 1.1;
      letter-spacing: -.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .profile-email { color: var(--c-text-muted); margin-bottom: 28px; }
    .profile-actions {
      display: flex; flex-direction: column; gap: 12px;
    }
    .profile-actions .btn { width: 100%; justify-content: center; }

    .delete-link {
      display: inline-block;
      margin-top: 28px;
      color: var(--c-terracotta);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: .82rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      text-decoration: underline;
      text-underline-offset: 4px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      transition: color .2s var(--ease);
    }
    .delete-link:hover { color: var(--c-terra-dark); }

    /* Editable username */
    .profile-name-row {
      display: inline-flex; align-items: center; gap: 8px;
      margin-bottom: 6px;
    }
    .username-edit-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--c-cream);
      border: var(--bw-1) solid var(--c-ink);
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-xs);
      transition: transform .15s var(--ease-back), box-shadow .15s var(--ease-back);
    }
    .username-edit-btn:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-sm); background: var(--c-golden); }
    .username-edit-btn svg { width: 14px; height: 14px; }
    .username-edit-input {
      font-family: var(--font-heading, var(--font-body));
      font-weight: 700;
      font-size: 1.6rem;
      line-height: 1.1;
      text-transform: uppercase;
      text-align: center;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      border: var(--bw-1) solid var(--c-ink);
      background: var(--c-cream);
      outline: none;
      box-shadow: var(--shadow-xs);
      max-width: 280px;
    }

    @media (max-width: 560px) {
      .auth-card, .profile-card { padding: 28px 22px; }
    }
  </style>
</head>
<body data-page="cuenta">

<div id="partial-nav"></div>

<!-- ============ AUTH ============ -->
<section class="auth">
  <div class="auth__inner">

    <!-- LOGGED OUT VIEW -->
    <div id="authLoggedOut">
      <div class="auth__head">
        <span class="eyebrow">Tu cuenta</span>
        <h1 class="auth__title">Bienvenido<br>a <em>Logramo</em></h1>
        <p class="auth__sub">Entra para guardar tus guías favoritas, seguir tu progreso y recibir consejos a medida.</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-tab="login" role="tab" aria-selected="true">Entrar</button>
          <button class="auth-tab" data-tab="signup" role="tab" aria-selected="false">Crear cuenta</button>
        </div>

        <div class="auth-error" id="authError"></div>

        <!-- LOGIN -->
        <form class="auth-form active" id="loginForm" data-form="login" onsubmit="return handleLogin(event)">
          <div class="auth-field">
            <label for="loginEmail">Correo electrónico</label>
            <input class="auth-input" id="loginEmail" type="email" placeholder="tu@correo.com" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="loginPassword">Contraseña</label>
            <input class="auth-input" id="loginPassword" type="password" placeholder="Tu contraseña" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn--dark btn--lg">Entrar <svg class="icon"><use href="#i-arrow-right"/></svg></button>
          <p class="auth-note">¿Aún no tienes cuenta? <a href="#" onclick="switchTab('signup');return false;">Crea una en 10 segundos</a></p>
        </form>

        <!-- SIGN UP -->
        <form class="auth-form" id="signupForm" data-form="signup" onsubmit="return handleSignup(event)">
          <div class="auth-field">
            <label for="signupName">Nombre de usuario</label>
            <input class="auth-input" id="signupName" type="text" placeholder="¿Cómo te llamamos?" autocomplete="username" required minlength="2" />
          </div>
          <div class="auth-field">
            <label for="signupEmail">Correo electrónico</label>
            <input class="auth-input" id="signupEmail" type="email" placeholder="tu@correo.com" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="signupPassword">Contraseña</label>
            <input class="auth-input" id="signupPassword" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6" />
          </div>
          <button type="submit" class="btn btn--dark btn--lg"><svg class="icon"><use href="#i-paw"/></svg> Crear cuenta</button>
          <p class="auth-note">Sin spam · sin tarjeta · solo lo esencial</p>
        </form>
      </div>
    </div>

    <!-- LOGGED IN VIEW -->
    <div id="authLoggedIn" style="display:none">
      <div class="auth__head">
        <span class="eyebrow">Tu cuenta</span>
        <h1 class="auth__title">Hola<br>de <em>nuevo</em></h1>
      </div>

      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar">L</div>

        <div class="profile-name-row">
          <span class="profile-name" id="profileName">—</span>
          <button class="username-edit-btn" id="editUsernameBtn" onclick="startEditUsername()" aria-label="Editar nombre">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>
        </div>
        <input type="text" class="username-edit-input" id="usernameEditInput" style="display:none" maxlength="24" />

        <div class="profile-email" id="profileEmail">—</div>

        <div class="profile-actions">
          <a href="biblioteca.html" class="btn btn--primary btn--lg"><svg class="icon"><use href="#i-book"/></svg> Ir a la biblioteca</a>
          <button class="btn btn--cream btn--lg" onclick="handleLogout()">Cerrar sesión <svg class="icon"><use href="#i-arrow-right"/></svg></button>
        </div>

        <button class="delete-link" onclick="handleDeleteAccount()">Eliminar mi cuenta</button>
      </div>
    </div>

  </div>
</section>

<div id="partial-footer"></div>
<div id="partial-cart"></div>
<div id="partial-chat"></div>
<div id="partial-popups"></div>

<script src="partials.js?v=20260612"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js?v=20260612"></script>
<script src="animations.js?v=20260612"></script>
<script>
/* ============ ACCOUNT — real Supabase Auth ============ */
const sb = window.supabase.createClient(
  'https://eopobchvkfvkkrtrzeyu.supabase.co',
  'sb_publishable_6GZ1L30_DktAPRbsPs-6Lg_PSqJ5c-D',
  { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'logramo_supa_auth' } }
);

// Mirror the active session into the same localStorage key the chat panel and
// nav initials watch, so they update without any extra wiring.
const ID_KEY = 'logramo_user';
function syncIdentity(profile) {
  if (profile && profile.email) {
    localStorage.setItem(ID_KEY, JSON.stringify({
      id: profile.id,
      username: profile.username,
      name: profile.username,
      email: profile.email,
    }));
  } else {
    localStorage.removeItem(ID_KEY);
  }
  if (typeof window.refreshNavUser === 'function') window.refreshNavUser();
}

async function loadProfile(userId) {
  const r = await sb.from('profiles').select('id,username,email,created_at').eq('id', userId).maybeSingle();
  return r && r.data;
}

function renderAuthState(profile) {
  const out = document.getElementById('authLoggedOut');
  const inn = document.getElementById('authLoggedIn');
  if (profile) {
    out.style.display = 'none';
    inn.style.display = 'block';
    document.getElementById('profileName').textContent = profile.username;
    document.getElementById('profileEmail').textContent = profile.email;
    document.getElementById('profileAvatar').textContent = (profile.username || 'L').trim().charAt(0).toUpperCase();
  } else {
    out.style.display = 'block';
    inn.style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  const el = document.getElementById('authError');
  el.classList.remove('show');
  el.textContent = '';
}

function switchTab(tab) {
  clearError();
  document.querySelectorAll('.auth-tab').forEach(t => {
    const on = t.dataset.tab === tab;
    t.classList.toggle('active', on);
    t.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  document.querySelectorAll('.auth-form').forEach(f => {
    f.classList.toggle('active', f.dataset.form === tab);
  });
}
document.querySelectorAll('.auth-tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});

function spError(e) {
  const msg = (e && e.message) || '';
  if (/already registered|already exists/i.test(msg)) return 'Ya hay una cuenta con ese correo. Inicia sesión.';
  if (/invalid login credentials/i.test(msg)) return 'Correo o contraseña incorrectos.';
  if (/password|6 characters/i.test(msg)) return 'La contraseña debe tener al menos 6 caracteres.';
  if (/invalid email/i.test(msg)) return 'El correo no parece válido.';
  return msg || 'Algo falló. Vuelve a intentarlo.';
}

async function handleSignup(e) {
  e.preventDefault();
  clearError();
  const username = document.getElementById('signupName').value.trim();
  const email    = document.getElementById('signupEmail').value.trim().toLowerCase();
  const password = document.getElementById('signupPassword').value;
  if (!username || !email || !password) { showError('Rellena todos los campos.'); return false; }
  if (password.length < 6)               { showError('La contraseña debe tener al menos 6 caracteres.'); return false; }

  const btn = e.target.querySelector('button[type=submit]');
  if (btn) btn.disabled = true;
  try {
    const r = await sb.auth.signUp({ email, password, options: { data: { username } } });
    if (r.error) throw r.error;
    const userId = r.data && r.data.user && r.data.user.id;
    if (!userId) throw new Error('No user returned');
    // Create the profile row — this also fires the welcome email trigger
    const ins = await sb.from('profiles').insert({ id: userId, username, email });
    if (ins.error) throw ins.error;
    const profile = { id: userId, username, email };
    syncIdentity(profile);
    renderAuthState(profile);
    if (typeof showToast === 'function') showToast(`¡Bienvenido, ${username}! Te enviamos un correo.`);
  } catch (err) {
    showError(spError(err));
  } finally {
    if (btn) btn.disabled = false;
  }
  return false;
}

async function handleLogin(e) {
  e.preventDefault();
  clearError();
  const email    = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('Rellena todos los campos.'); return false; }

  const btn = e.target.querySelector('button[type=submit]');
  if (btn) btn.disabled = true;
  try {
    const r = await sb.auth.signInWithPassword({ email, password });
    if (r.error) throw r.error;
    const userId = r.data && r.data.user && r.data.user.id;
    let profile = await loadProfile(userId);
    if (!profile) {
      // Profile row missing (e.g. signed up elsewhere) — create a minimal one
      const fallbackName = (r.data.user.user_metadata && r.data.user.user_metadata.username) || email.split('@')[0];
      await sb.from('profiles').insert({ id: userId, username: fallbackName, email });
      profile = { id: userId, username: fallbackName, email };
    }
    syncIdentity(profile);
    renderAuthState(profile);
    if (typeof showToast === 'function') showToast(`¡Hola otra vez, ${profile.username}!`);
  } catch (err) {
    showError(spError(err));
  } finally {
    if (btn) btn.disabled = false;
  }
  return false;
}

async function handleLogout() {
  await sb.auth.signOut();
  syncIdentity(null);
  renderAuthState(null);
  if (typeof showToast === 'function') showToast('Sesión cerrada');
}

async function startEditUsername() {
  const session = (await sb.auth.getSession()).data.session;
  if (!session) return;
  const userId = session.user.id;
  const currentProfile = await loadProfile(userId);
  if (!currentProfile) return;

  const nameEl = document.getElementById('profileName');
  const btn    = document.getElementById('editUsernameBtn');
  const input  = document.getElementById('usernameEditInput');
  input.value = currentProfile.username;
  nameEl.style.display = 'none';
  btn.style.display = 'none';
  input.style.display = 'inline-block';
  input.focus(); input.select();
  const save = async () => {
    const val = input.value.trim();
    if (val.length >= 2 && val !== currentProfile.username) {
      const r = await sb.from('profiles').update({ username: val }).eq('id', userId);
      if (!r.error) {
        currentProfile.username = val;
        syncIdentity(currentProfile);
        if (typeof showToast === 'function') showToast('Nombre actualizado');
      }
    }
    renderAuthState(currentProfile);
  };
  input.onblur = save;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = currentProfile.username; input.blur(); }
  };
}

async function handleDeleteAccount() {
  const session = (await sb.auth.getSession()).data.session;
  if (!session) return;
  const userId = session.user.id;
  const profile = await loadProfile(userId);
  const label = (profile && profile.username) || 'tu cuenta';
  if (!confirm(`¿Seguro que quieres eliminar la cuenta de ${label}? Esta acción no se puede deshacer.`)) return;
  // Delete profile (auth.users row remains; admin can clean up server-side)
  await sb.from('profiles').delete().eq('id', userId);
  await sb.auth.signOut();
  syncIdentity(null);
  renderAuthState(null);
  if (typeof showToast === 'function') showToast('Cuenta eliminada');
}

// On page load: restore session if any
(async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const profile = await loadProfile(session.user.id);
    syncIdentity(profile);
    renderAuthState(profile);
  } else {
    renderAuthState(null);
  }
  sb.auth.onAuthStateChange(async (event, sess) => {
    if (sess) {
      const profile = await loadProfile(sess.user.id);
      syncIdentity(profile);
      renderAuthState(profile);
    } else {
      syncIdentity(null);
      renderAuthState(null);
    }
  });
})();
</script>
</body>
</html>
